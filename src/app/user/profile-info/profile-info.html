<div>
  <h2>Personal Information</h2>

  @if (loading()) {
    <div class="animate-pulse space-y-4">
      <div class="h-4 bg-gray-200 rounded w-1/4"></div>
      <div class="h-4 bg-gray-200 rounded w-1/2"></div>
      <div class="h-4 bg-gray-200 rounded w-3/4"></div>
    </div>
  }
  @if (error()) {
    <div class="bg-red-50 text-red-600 p-4 rounded-xl">
      {{ error() }}
    </div>
  }

  @if (profile(); as user) {
    <div class="flex items-center space-x-6 mb-8">
      <div class="w-20 h-20 bg-green-100 text-green-800 rounded-full flex items-center justify-center text-2xl font-bold">
        {{ user.userName.charAt(0) | uppercase }}
      </div>
      <div>
        <h3 class="text-xl font-semibold">{{ user.name }}</h3>
        <p class="text-gray-500">{{ user.email }}</p>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-6 border-t border-gray-100">
      <div>
        <label class="block text-sm font-medium text-gray-500 mb-1">Full Name</label>
        <p class="text-gray-800 font-medium">{{ user.userName }}</p>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-500 mb-1">Email Address</label>
        <p class="text-gray-800 font-medium">{{ user.email }}</p>
      </div>
      </div>
  }
</div>
