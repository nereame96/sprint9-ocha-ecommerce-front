<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 lg:py-20 antialiased text-gray-900 min-h-[calc(100vh-100px)]">

  <header class="mb-12 border-b border-gray-100 pb-8">
    <h1 class="text-3xl md:text-4xl font-light tracking-tight uppercase">My Account</h1>
  </header>

  <div class="grid grid-cols-1 lg:grid-cols-4 gap-12 lg:gap-24 items-start">

    <aside class="lg:col-span-1" aria-label="Menú de perfil">
      <nav class="flex flex-row lg:flex-col gap-8 overflow-x-auto lg:overflow-visible pb-4 lg:pb-0 border-b border-gray-100 lg:border-none">

        <a
          routerLink="/profile/info"
          routerLinkActive="text-[#87af4b] border-[#87af4b]"
          [routerLinkActiveOptions]="{exact: true}"
          class="text-xs font-bold uppercase tracking-widest whitespace-nowrap transition-colors text-gray-400 hover:text-black lg:border-l-2 lg:pl-4 border-transparent lg:pb-0 pb-2 border-b-2 lg:border-b-0">
          Profile Info
        </a>

        <a
          routerLink="/profile/orders"
          routerLinkActive="text-[#87af4b] border-[#87af4b]"
          class="text-xs font-bold uppercase tracking-widest whitespace-nowrap transition-colors text-gray-400 hover:text-black lg:border-l-2 lg:pl-4 border-transparent lg:pb-0 pb-2 border-b-2 lg:border-b-0">
          Order History
        </a>

      </nav>
    </aside>

    <main class="lg:col-span-3 min-h-[400px]">

      <router-outlet></router-outlet>

    </main>

  </div>
</div>
