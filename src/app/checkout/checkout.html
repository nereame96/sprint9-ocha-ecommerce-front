<div class="max-w-6xl mx-auto px-4 py-8">
  <h1 class="text-3xl font-bold text-indigo-900 mb-8">Check Out</h1>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">

    <div>
      <h2 class="text-xl font-semibold mb-6">Delivery Address</h2>

      <form [formGroup]="checkoutForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Street and Number</label>
          <input formControlName="street" type="text" class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">City</label>
            <input formControlName="city" type="text" class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-indigo-500 outline-none">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Postal Code</label>
            <input formControlName="postalCode" type="text" class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-indigo-500 outline-none">
          </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Country</label>
            <input formControlName="country" type="text" class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-indigo-500 outline-none">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Phone number</label>
            <input formControlName="phone" type="text" class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-indigo-500 outline-none">
          </div>
        </div>
      </form>
    </div>

    <div class="bg-gray-50 p-6 rounded-2xl h-fit">
      <h2 class="text-xl font-semibold mb-6">Order Details</h2>

      <div class="border-b border-gray-200 pb-4 mb-4">
        <p class="text-gray-600">Have {{ cartService.totalItems() }} items in your cart</p>
      </div>

      <div class="flex justify-between items-center mb-8">
        <span class="text-lg font-medium text-gray-700">Total to pay</span>
        <span class="text-2xl font-bold text-indigo-700">{{ cartService.totalAmount() | currency:'EUR' }}</span>
      </div>

      <button
        (click)="onPay()"
        [disabled]="checkoutForm.invalid"
        class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-indigo-700 transition-colors disabled:bg-gray-400 disabled:cursor-not-allowed shadow-lg">
        Secure Payment
      </button>
      <p class="text-center text-xs text-gray-500 mt-4">Powered by Stripe 🔒</p>

    </div>
  </div>
</div>
