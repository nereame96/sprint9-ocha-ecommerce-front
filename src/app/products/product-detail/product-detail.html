@if (product()) {
  <section
    class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 lg:py-24 antialiased text-neutral-900"
  >
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-16 items-start">
      <div class="space-y-4" data-purpose="product-gallery">
        <div class="aspect-square bg-stone-50 overflow-hidden rounded-sm">
          <img
            [alt]="product()?.name"
            class="w-full h-full object-cover transition-soft"
            [src]="product()?.imageUrl"
          />
        </div>
      </div>

      <div class="flex flex-col space-y-8">
        <header class="space-y-2">
          <p class="text-xs font-semibold tracking-widest text-matcha uppercase">Premium Tea</p>

          <h1 class="text-4xl md:text-5xl font-light tracking-tight">{{ product()?.name }}</h1>
          <p class="text-2xl text-gray-500 mt-4">{{ product()?.price }} €</p>
        </header>

        <div class="prose prose-sm text-gray-500 max-w-none">
          <p>{{ product()?.description }}</p>
        </div>

        <div class="pt-6 border-t border-gray-100" data-purpose="purchase-actions">
          <div class="flex flex-col sm:flex-row gap-4">
            <button
              (click)="addToCart()"
              [disabled]="product()?.stock === 0"
              [attr.aria-label]="'Añadir ' + product()?.name + ' al carrito'"
              class="flex-1 h-14 uppercase tracking-widest text-sm font-medium transition-all duration-300 rounded-sm px-8"
              [class.bg-matcha]="product()?.stock !== 0"
              [class.text-white]="product()?.stock !== 0"
              [class.hover:bg-black]="product()?.stock !== 0"
              [class.bg-gray-200]="product()?.stock === 0"
              [class.text-gray-400]="product()?.stock === 0"
              [class.cursor-not-allowed]="product()?.stock === 0"
            >
              @if (product()?.stock === 0) {
                No Stock
              } @else {
                Add to Cart
              }
            </button>
          </div>
        </div>
      </div>
    </div>
  </section>
} @else {
  <div class="flex justify-center items-center h-screen text-gray-500">
    <p class="text-xl animate-pulse tracking-widest uppercase text-matcha">Tea no available...</p>
  </div>
}
