

@if (product()) {
  <div class="product-detail" >
    <h1> {{ product()?.name}}</h1>
    <img [src]="product()?.imageUrl" [alt]="product()?.name">
    <p>{{ product()?.description}}</p>
    <h2>{{ product()?.price}}€</h2>
    
    <button
    (click)="addToCart()"
    [disabled]="product()?.stock === 0">
    @if(product()?.stock === 0) {
      No stock
    } @else {
      Add to Cart
    }
    </button>

  </div>
} @else {
  <p>Loading product details...</p>
}
