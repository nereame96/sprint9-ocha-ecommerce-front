<div class="flex flex-wrap gap-3 mb-8 justify-center">

  <button
    (click)="onSelectCategory(null)"
    class="px-4 py-2 rounded-full border transition-colors"
    [class.bg-green-700]="selectedCategory() === null"
    [class.text-white]="selectedCategory() === null"
    [class.bg-white]="selectedCategory() !== null">
    All
  </button>

  @for (category of categoryList; track category) {
    <button
      (click)="onSelectCategory(category)"
      class="px-4 py-2 rounded-full border transition-colors"
      [class.bg-green-700]="selectedCategory() === category"
      [class.text-white]="selectedCategory() === category"
      [class.bg-white]="selectedCategory() !== category">
      {{ category }}
    </button>
  }
</div>

<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">

  @for (product of filteredProducts(); track product._id) {

    <div class="border rounded-xl p-4 shadow-sm flex flex-col justify-between">

      <a [routerLink]="['/product-detail', product._id]" class="block mb-4 cursor-pointer hover:opacity-80">
        <h3 class="font-bold text-xl mb-2">{{ product.name }}</h3>
        <span class="block text-green-700 font-semibold">{{ product.price }} €</span>
        <span class="block text-gray-500 text-sm">{{ product.quantity }}</span>
      </a>

      <button
        (click)="cartService.addProduct(product, 1)"
        class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition-colors">
        Add to Cart
      </button>

    </div>
  }
</div>
