<nav class="px-4 md:px-6 py-4 md:py-6">
  <div class="flex flex-row justify-between items-center">

    <a routerLink="/" class="flex items-center gap-2 md:gap-3 group z-50">
      <p class="text-2xl md:text-5xl font-bold   transition-colors duration-300">
        OCHA
      </p>
    </a>

    <div class="hidden lg:flex items-center gap-4">
      <a routerLink="/calendar" routerLinkActive="text-stone-700" [routerLinkActiveOptions]="{exact: false}"
         class=" font-semibold transition-all duration-300 px-3 py-2 text-base">
        SHOP
      </a>
      <a routerLink="/dashboard" routerLinkActive="text-stone-700" [routerLinkActiveOptions]="{exact: false}"
         class=" font-semibold transition-all duration-300 px-3 py-2 text-base">
        CUSTOM TEA
      </a>
    </div>

    <div class="flex items-center gap-4">

      <button (click)="cartService.toggleCart()">
        Cart ({{ cartService.totalItems() }})
      </button>

      <div class="relative">
        <button (click)="toggleUserMenu()" class="p-2 bg-emerald-50 text-gray-700 rounded-xl hover:bg-emerald-100 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
        </button>

        @if (isUserMenuOpen()) {
          <div class="fixed inset-0 z-40" (click)="isUserMenuOpen.set(false)"></div>
          <div class="absolute right-0 top-full mt-2 w-48 bg-white rounded-xl shadow-lg border border-gray-100 flex flex-col z-50 overflow-hidden">
            <a routerLink="/profile/info" (click)="isUserMenuOpen.set(false)" class="px-4 py-3 hover:bg-gray-50 border-b border-gray-50 text-stone-700">PROFILE</a>
            <a routerLink="/profile/orders" (click)="isUserMenuOpen.set(false)" class="px-4 py-3 hover:bg-gray-50 border-b border-gray-50 text-stone-700">ORDERS</a>

            @if (isAuthenticated()) {
              <button (click)="onLogout()" (click)="isUserMenuOpen.set(false)" class="px-4 py-3 text-left text-red-600 hover:bg-red-50 font-medium transition-colors">LOG OUT</button>
            } @else {
              <a routerLink="/login" (click)="isUserMenuOpen.set(false)" class="px-4 py-3 text-left text-indigo-600 hover:bg-indigo-50 font-medium transition-colors">LOG IN</a>
            }
          </div>
        }
      </div>

      <button (click)="toggleMenu()" class="lg:hidden z-50 p-2 rounded-lg hover:bg-indigo-50 transition-colors duration-300"
              [attr.aria-label]="isMenuOpen() ? 'Close menu' : 'Open menu'" [attr.aria-expanded]="isMenuOpen()">
        <div class="w-6 h-5 flex flex-col justify-between">
          <span class="block h-0.5 w-full bg-indigo-700 transition-all duration-300" [class.rotate-45]="isMenuOpen()" [class.translate-y-2]="isMenuOpen()"></span>
          <span class="block h-0.5 w-full bg-indigo-700 transition-all duration-300" [class.opacity-0]="isMenuOpen()"></span>
          <span class="block h-0.5 w-full bg-indigo-700 transition-all duration-300" [class.-rotate-45]="isMenuOpen()" [class.-translate-y-2]="isMenuOpen()"></span>
        </div>
      </button>

    </div>

  </div> <div class="fixed inset-0 bg-white z-40 lg:hidden transition-all duration-300 ease-in-out"
       [class.opacity-0]="!isMenuOpen()" [class.pointer-events-none]="!isMenuOpen()" [class.opacity-100]="isMenuOpen()">
    <div class="flex flex-col items-center justify-center h-full gap-8 px-8">
      <a routerLink="/events" (click)="closeMenu()" routerLinkActive="text-stone-700" [routerLinkActiveOptions]="{exact: true}"
         class="text-indigo-700 hover:text-indigo-900 font-semibold transition-all duration-300 text-2xl">
        SHOP
      </a>
      <a routerLink="/events/map" (click)="closeMenu()" routerLinkActive="text-stone-700" [routerLinkActiveOptions]="{exact: true}"
         class="text-indigo-700 hover:text-indigo-900 font-semibold transition-all duration-300 text-2xl">
        CUSTOM TEA
      </a>
    </div>
  </div>

</nav>
