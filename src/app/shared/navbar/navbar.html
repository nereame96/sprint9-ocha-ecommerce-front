<nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md px-6 md:px-12 py-5 transition-colors duration-300">
  <div class="max-w-7xl mx-auto flex items-center justify-between">

    <div class="hidden md:flex items-center gap-10">
      <a routerLink="/products-list" routerLinkActive="text-[#87af4b]"
         class="text-xs uppercase tracking-widest font-bold hover:text-[#87af4b] transition-colors">
        Shop
      </a>
      <a routerLink="/custom-tea" routerLinkActive="text-[#87af4b]"
         class="text-xs uppercase tracking-widest font-bold hover:text-[#87af4b] transition-colors">
        Custom Tea
      </a>
    </div>

    <a routerLink="/" class="flex items-center gap-2 group cursor-pointer" aria-label="Go to Ocha Home">
      <div class="text-[#87af4b]">
        <svg class="w-6 h-6 md:w-8 md:h-8 transition-transform group-hover:scale-110" fill="currentColor" viewBox="0 0 48 48">
          <path d="M42.4379 44C42.4379 44 36.0744 33.9038 41.1692 24C46.8624 12.9336 42.2078 4 42.2078 4L7.01134 4C7.01134 4 11.6577 12.932 5.96912 23.9969C0.876273 33.9029 7.27094 44 7.27094 44L42.4379 44Z"></path>
        </svg>
      </div>
      <h1 class="text-xl md:text-3xl font-bold tracking-tighter uppercase transition-colors">Ocha</h1>
    </a>

    <div class="flex items-center gap-6">

      <div class="relative">
        <button
          (click)="toggleUserMenu()"
          class="p-1 text-gray-800 hover:text-[#87af4b] transition-colors flex items-center"
          aria-label="User Menu">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
        </button>

        @if (isUserMenuOpen()) {
          <div class="fixed inset-0 z-40" (click)="isUserMenuOpen.set(false)"></div>
          <div class="absolute right-0 top-full mt-4 w-48 bg-white/95 backdrop-blur-sm border border-gray-100 flex flex-col z-50 shadow-sm py-2">
            <a routerLink="/profile/info" (click)="isUserMenuOpen.set(false)" class="px-5 py-2 text-xs uppercase tracking-widest hover:text-[#87af4b] transition-colors">Profile</a>
            <a routerLink="/profile/orders" (click)="isUserMenuOpen.set(false)" class="px-5 py-2 text-xs uppercase tracking-widest hover:text-[#87af4b] transition-colors border-b border-gray-50 pb-3 mb-1">Orders</a>

            @if (isAuthenticated()) {
              <button (click)="onLogout(); isUserMenuOpen.set(false)" class="px-5 py-2 text-left text-[10px] uppercase font-bold tracking-widest text-red-500 hover:text-red-700 transition-colors">Log Out</button>
            } @else {
              <a routerLink="/login" (click)="isUserMenuOpen.set(false)" class="px-5 py-2 text-left text-[10px] uppercase font-bold tracking-widest text-[#87af4b] hover:text-green-800 transition-colors">Log In</a>
            }
          </div>
        }
      </div>

      <button
        (click)="cartService.toggleCart()"
        class="relative p-1 text-gray-800 hover:text-[#87af4b] transition-colors flex items-center"
        aria-label="Open cart">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
        </svg>
        <span class="absolute -top-1 -right-1 flex items-center justify-center w-4 h-4 bg-[#87af4b] text-white text-[9px] font-bold rounded-full">
          {{ cartService.totalItems() }}
        </span>
      </button>

      <button
  (click)="toggleMenu()"
  class="md:hidden relative z-50 p-1 text-gray-800 hover:text-[#87af4b] transition-colors focus:outline-none"
  [attr.aria-label]="isMenuOpen() ? 'Close menu' : 'Open menu'"
  [attr.aria-expanded]="isMenuOpen()">

  <div class="w-6 h-5 flex flex-col items-center justify-center relative">

    <span
      class="block absolute h-px w-full bg-current transition-all duration-300 ease-in-out origin-center"
      [class.rotate-45]="isMenuOpen()"
      [class.translate-y-0]="isMenuOpen()"
      [class.-translate-y-2]="!isMenuOpen()">
    </span>

    <span
      class="block absolute h-px w-full bg-current transition-all duration-300 ease-in-out"
      [class.opacity-0]="isMenuOpen()">
    </span>

    <span
      class="block absolute h-px w-full bg-current transition-all duration-300 ease-in-out origin-center"
      [class.-rotate-45]="isMenuOpen()"
      [class.translate-y-0]="isMenuOpen()"
      [class.translate-y-2]="!isMenuOpen()">
    </span>

  </div>
</button>

    </div>
  </div>
</nav>

<div
  class="fixed inset-0 bg-white/95 backdrop-blur-md z-40 md:hidden transition-all duration-300 ease-in-out flex flex-col items-center justify-center pt-20"
  [class.opacity-0]="!isMenuOpen()"
  [class.pointer-events-none]="!isMenuOpen()"
  [class.opacity-100]="isMenuOpen()">

  <div class="flex flex-col items-center gap-10">
    <a routerLink="/products-list" (click)="closeMenu()" routerLinkActive="text-[#87af4b]"
       class="text-2xl uppercase tracking-[0.2em] font-light hover:text-[#87af4b] transition-colors">
      Shop
    </a>
    <a routerLink="/custom-tea" (click)="closeMenu()" routerLinkActive="text-[#87af4b]"
       class="text-2xl uppercase tracking-[0.2em] font-light hover:text-[#87af4b] transition-colors">
      Custom Tea
    </a>
  </div>
  <div class="mt-20 w-12 h-px bg-gray-300"></div>
</div>
